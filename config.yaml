# ==========================================
# 入力方法の設定
# "xlsx"   : Excelに書いたURL一覧を使う
# "domain" : 指定したドメインを自動クロールしてURLを集める
# 初期状態では input/urls.xlsx がなくても確認しやすいように
# domain モードを既定値にしています。
# ==========================================
input_mode: "domain"

# ==========================================
# Excelモードの設定
# input_mode が "xlsx" のときに使います
# ==========================================
# 読み込むExcelファイルの場所
input_xlsx: "input/urls.xlsx"

# 読み込むシート名
sheet_name: "Sheet1"

# URLが入っている列名
url_column: "URL"

# ==========================================
# ドメインモードの設定
# input_mode が "domain" のときに使います
# この作業単位ではまだクロールは実装しませんが、
# 後続作業でそのまま使えるように項目だけ先に置いています。
# ==========================================
# クロール開始URL
# 設定チェックでは http:// または https:// で始まる必要があります。
domain_url: "https://example.com/"

# true  : blog.example.com などのサブドメインも含める
# false : 指定したドメインだけを対象にする
include_subdomains: false

# true  : robots.txt を守る
# false : robots.txt の判定を無視する
respect_robots_txt: true

# WordPress サイトなら REST API (wp-json/wp/v2/posts) を先に試す
# false にすると sitemap / BFS のみ使います
prefer_wordpress_api: true

# URLの集め方
# sitemap_then_bfs : まず sitemap.xml を確認し、足りなければ内部リンクをたどる
crawl_strategy: "sitemap_then_bfs"

# 最大で何ページまで処理するか
max_pages: 200

# 何階層先までリンクをたどるか
max_depth: 3

# ==========================================
# 除外したいURLパターン
# URLにこの文字列が含まれていたら最初から除外します
# ノイズページ対策として後から調整してください
# ==========================================
exclude_url_patterns:
  - "/tag/"
  - "/category/"
  - "/search"

# ==========================================
# HTTPアクセスの設定
# この作業単位ではまだ未使用ですが、後続実装で利用します
# ==========================================
request_timeout_sec: 15
retry_count: 2
sleep_min_sec: 2.0
sleep_max_sec: 3.0
user_agent: "SiteKeywordAnalyzer/1.0"

# ==========================================
# 本文抽出の設定
# ==========================================
# 本文が短すぎるページは集計から外す基準文字数
min_text_length: 100

# ==========================================
# noindex の判定設定
# この作業単位ではまだ未使用です
# ==========================================
detect_noindex: true
exclude_noindex_pages: false

# ==========================================
# ワードクラウドの設定
# font_path が空欄なら、日本語フォントを自動選択します。
# Streamlit Community Cloud では packages.txt の fonts-noto-cjk を使う前提です。
# 手元で別フォントを使いたい場合だけ明示してください。
# Windows 例: C:/Windows/Fonts/msgothic.ttc
# macOS 例 : /System/Library/Fonts/ヒラギノ角ゴシック W3.ttc
# ==========================================
font_path: ""

# ワードクラウドに表示する最大単語数
top_n_wordcloud: 200

# ==========================================
# ストップワードの設定
# 1行に1単語ずつ書きます
# ==========================================
stopwords_default_file: "config/stopwords_ja.txt"
stopwords_user_file: "config/user_stopwords.txt"

# ==========================================
# 複合語抽出の設定
# ==========================================
# true  : 連続する名詞や名詞+接尾をなるべく1語にまとめる
# false : 通常の名詞抽出を使う
compound_mode: true

# 必ず1語として扱いたい複合語を追加できます
forced_compounds: []

# ==========================================
# 出力設定
# 通常実行時に output/YYYYMMDD_HHMMSS/ を作成します
# ==========================================
output_root: "output"
save_raw_frequency: true
save_extracted_text: false
save_robots_report: true
save_noindex_report: true
save_url_audit: true
