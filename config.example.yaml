# =============================================================
# site_keyword_analyzer 設定例
#
# 初めて使う場合は、まず xlsx モードで試すのがおすすめです。
# 先に次を実行してサンプルExcelを作ると確認しやすくなります。
#   python tools/create_sample_input.py
# =============================================================

# -------------------------------------------------------------
# 入力モード
# "xlsx"   : Excel に書いた URL 一覧を使う
# "domain" : ドメインを自動収集して分析する
# 初回は xlsx をおすすめします。
# -------------------------------------------------------------
input_mode: "xlsx"

# -------------------------------------------------------------
# xlsx モードの設定
# input_mode が "xlsx" のときだけ使います。
# 最初はサンプルファイル input/urls_sample.xlsx で確認できます。
# -------------------------------------------------------------
# 読み込む Excel ファイル
input_xlsx: "input/urls_sample.xlsx"

# 読み込むシート名
sheet_name: "Sheet1"

# URL が入っている列名
url_column: "URL"

# -------------------------------------------------------------
# domain モードの設定
# input_mode が "domain" のときだけ使います。
# まず robots.txt と sitemap を確認し、足りなければ BFS で補完します。
# -------------------------------------------------------------
# 開始URL
# http:// または https:// で始まるURLを入れてください。
domain_url: "https://example.com/"

# true  : blog.example.com などのサブドメインも含める
# false : 指定したホストだけを対象にする
include_subdomains: false

# true  : robots.txt を守る（推奨）
# false : robots.txt の判定を無視する
respect_robots_txt: true

# WordPress サイトなら REST API (wp-json/wp/v2/posts) を先に試します
# false にすると sitemap / BFS のみ使います
prefer_wordpress_api: true

# URL 収集方法
# sitemap_then_bfs : まず sitemap、足りなければ BFS で内部リンク補完
crawl_strategy: "sitemap_then_bfs"

# 最大で何ページまで分析するか
# 初回確認は 20〜50 くらいがおすすめです。
max_pages: 30

# BFS で何階層先までたどるか
# 初回確認は 1〜2 がおすすめです。
max_depth: 1

# -------------------------------------------------------------
# 除外したい URL パターン
# URL にこの文字列が含まれていたら対象から外します。
# カテゴリ一覧、タグ一覧、検索結果ページのノイズ対策に使います。
# -------------------------------------------------------------
exclude_url_patterns:
  - "/tag/"
  - "/category/"
  - "/search"
  - "/author/"

# -------------------------------------------------------------
# HTTP アクセス設定
# サーバー負荷を下げるため、待機時間は 2〜3 秒のままが推奨です。
# -------------------------------------------------------------
request_timeout_sec: 15
retry_count: 2
sleep_min_sec: 2.0
sleep_max_sec: 3.0
user_agent: "SiteKeywordAnalyzer/1.0"

# -------------------------------------------------------------
# 本文抽出設定
# 本文が短すぎるページは low_text として集計から外します。
# -------------------------------------------------------------
min_text_length: 100

# -------------------------------------------------------------
# noindex 判定設定
# detect_noindex          : noindex を検出するか
# exclude_noindex_pages   : noindex ページを集計から外すか
# -------------------------------------------------------------
detect_noindex: true
exclude_noindex_pages: false

# -------------------------------------------------------------
# ワードクラウド設定
# font_path が空欄なら、日本語フォントを自動選択します。
# Streamlit Community Cloud では packages.txt の fonts-noto-cjk を使う前提です。
# 手元で別フォントを使いたい場合だけ明示してください。
#
# Windows 例:
#   C:/Windows/Fonts/msgothic.ttc
#   C:/Windows/Fonts/YuGothM.ttc
# macOS 例:
#   /System/Library/Fonts/ヒラギノ角ゴシック W3.ttc
# Linux 例:
#   /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
# -------------------------------------------------------------
font_path: ""

# ワードクラウドに表示する最大単語数
top_n_wordcloud: 200

# -------------------------------------------------------------
# ストップワード設定
# 1行に1単語ずつ書いてください。
# stopwords_default_file : 最初から除外する不要語
# stopwords_user_file    : 結果を見ながら後で追加する不要語
# -------------------------------------------------------------
stopwords_default_file: "config/stopwords_ja.txt"
stopwords_user_file: "config/user_stopwords.txt"

# ==========================================
# 複合語抽出の設定
# ==========================================
# true  : 連続する名詞や名詞+接尾をなるべく1語にまとめる
# false : 通常の名詞抽出を使う
compound_mode: true

# 必ず1語として扱いたい複合語を追加できます
forced_compounds: []

# -------------------------------------------------------------
# 出力設定
# 実行ごとに output/YYYYMMDD_HHMMSS/ を作ります。
# -------------------------------------------------------------
output_root: "output"

# true なら user stopwords 適用前の頻度表も保存する
save_raw_frequency: true

# true なら抽出本文も CSV 保存する（サイズが大きくなりやすい）
save_extracted_text: false

# 補助レポートの保存フラグ
save_robots_report: true
save_noindex_report: true
save_url_audit: true
